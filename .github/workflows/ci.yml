name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "PACKAGE_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: |
          if [ -n "${PACKAGE_VERSION:-}" ]; then
            dotnet build --no-restore -c Release \
              -p:Version="$PACKAGE_VERSION" \
              -p:PackageVersion="$PACKAGE_VERSION" \
              -p:ContinuousIntegrationBuild=true
          else
            dotnet build --no-restore -c Release -p:ContinuousIntegrationBuild=true
          fi

      - name: Test
        run: dotnet test --no-build -c Release --collect:"XPlat Code Coverage" --results-directory coverage

      - name: Export security report (sample)
        run: |
          dotnet exec samples/SimpleOwaspHeaders.Sample/bin/Release/net10.0/SimpleOwaspHeaders.Sample.dll -- --export-security-report ./artifacts/security-headers-report.html

      - name: Upload security report
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: security-headers-report
          path: |
            artifacts/security-headers-report.html
            artifacts/security-headers-report.json

      - name: Pack
        run: |
          if [ -n "${PACKAGE_VERSION:-}" ]; then
            dotnet pack src/SimpleOwaspHeaders/SimpleOwaspHeaders.csproj -c Release --no-build -o artifacts \
              -p:Version="$PACKAGE_VERSION" -p:PackageVersion="$PACKAGE_VERSION"
            dotnet pack src/SimpleOwaspHeaders.Cookies/SimpleOwaspHeaders.Cookies.csproj -c Release --no-build -o artifacts \
              -p:Version="$PACKAGE_VERSION" -p:PackageVersion="$PACKAGE_VERSION"
          else
            dotnet pack src/SimpleOwaspHeaders/SimpleOwaspHeaders.csproj -c Release --no-build -o artifacts
            dotnet pack src/SimpleOwaspHeaders.Cookies/SimpleOwaspHeaders.Cookies.csproj -c Release --no-build -o artifacts
          fi

      - name: Upload packages
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/*.nupkg

  publish:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts

      - name: NuGet login (trusted publishing)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: |
          dotnet nuget push artifacts/*.nupkg \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
